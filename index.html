<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Apparel Design</title>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    /* ================= Base & Reset ================= */
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family: Arial, sans-serif; line-height:1.6; color:#333;}
    a {text-decoration:none; color: inherit;}
    header, footer {background:#111; color:#fff;}
    .navbar {display:flex; justify-content:space-between; align-items:center; padding:1rem;}
    .nav-links {display:flex; gap:1rem;}
    .nav-links a {padding:.5rem 1rem; border-radius:4px; transition:.3s;}
    .nav-links a:hover {background:#444;}
    .fa-bars {display:none; cursor:pointer; color:#fff;}

    /* ================= Responsive nav ================= */
    @media(max-width:768px){
      .nav-links {display:none; flex-direction:column; background:#222; position:absolute; top:60px; right:0; width:200px;}
      .nav-links.active {display:flex;}
      .fa-bars {display:block;}
    }

    /* ================= Hero section ================= */
    .hero {text-align:center; padding:4rem 1rem; background:#f5f5f5;}
    .hero h1 {font-size:2rem; margin-bottom:1rem;}
    .hero .btn {background:#111; color:#fff; padding:.75rem 1.5rem; border-radius:5px; display:inline-block; margin-top:1rem;}

    /* ================= Products grid ================= */
    .products-page {padding:2rem;}
    .products-grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:2rem;}
    .product-card {text-align:center; border:1px solid #ddd; padding:1rem; border-radius:5px;}
    .product-card img {width:100%; height:250px; object-fit:cover;}

    /* ================= Contact form ================= */
    .contact-page {padding:2rem;}
    form {display:flex; flex-direction:column; gap:1rem; max-width:400px; margin:auto;}
    input, textarea {padding:.75rem; border:1px solid #ccc; border-radius:4px; width:100%;}
    button {padding:.75rem; border:none; background:#111; color:#fff; border-radius:4px; cursor:pointer;}

    /* ================= Footer ================= */
    footer {text-align:center; padding:1rem; background:#111; color:#fff;}

    /* ================= Page Sections ================= */
    .page {display:none;}
    .page.active {display:block;}
  </style>
</head>
<body>
  <!-- ================= Header / Navbar ================= -->
  <header>
    <nav class="navbar">
      <div class="logo">TeeHoodie</div>
      <div class="nav-links" id="navLinks">
        <a href="#" onclick="showPage('home')">Home</a>
        <a href="#" onclick="showPage('products')">Products</a>
        <a href="#" onclick="showPage('contact')">Contact</a>
        <a href="#" id="loginBtn">Login with Google</a>
      </div>
      <i class="fas fa-bars" onclick="toggleMenu()"></i>
    </nav>
  </header>

  <!-- ================= Home Page ================= -->
  <main>
    <section id="home" class="page active hero">
      <h1>Create Your Own T-Shirt & Hoodie</h1>
      <p>Design, customize, and order your style online.</p>
      <a href="#" onclick="showPage('products')" class="btn">Start Designing</a>
    </section>

    <!-- ================= Products Page ================= -->
    <section id="products" class="page products-page">
      <h2>Our Products</h2>
      <div class="products-grid">
        <div class="product-card">
          <img src="https://via.placeholder.com/300x250.png?text=Classic+Tee" alt="T-shirt 1">
          <h3>Classic Tee</h3>
        </div>
        <div class="product-card">
          <img src="https://via.placeholder.com/300x250.png?text=Cozy+Hoodie" alt="Hoodie 1">
          <h3>Cozy Hoodie</h3>
        </div>
        <div class="product-card">
          <img src="https://via.placeholder.com/300x250.png?text=V-Neck+Tee" alt="T-shirt 2">
          <h3>V-Neck Tee</h3>
        </div>
        <!-- Add more products as needed -->
      </div>
    </section>

    <!-- ================= Contact Page ================= -->
    <section id="contact" class="page contact-page">
      <h2>Contact Us</h2>
      <form>
        <label>Email:</label>
        <input type="email" placeholder="your.email@example.com" required>
        <label>Message:</label>
        <textarea placeholder="Your message..." required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <!-- ================= Footer ================= -->
  <footer>
    <p>&copy; 2026 TeeHoodie. All rights reserved.</p>
  </footer>

  <!-- ================= JS ================= -->
  <script>
    // Toggle mobile menu
    function toggleMenu() {
      const navLinks = document.getElementById('navLinks');
      navLinks.classList.toggle('active');
    }

    // Switch between "pages"
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if(window.innerWidth <= 768) toggleMenu(); // close nav on mobile
    }

    // Google login placeholder
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', () => {
      alert("Google login placeholder. Add Firebase Auth to make it functional.");
    });
  </script>
</body>
</html>
