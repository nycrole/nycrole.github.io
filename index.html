<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surge</title>

<style>
:root {
  --bg:#0b0f17;
  --card:#111827;
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#5eead4;
  --accent2:#38bdf8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter, sans-serif;}
body{background:var(--bg);color:var(--text);}

/* NAV */
.navbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 25px;background:#05070ccc;backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:1000;
}
.logo{font-weight:800;letter-spacing:2px;}
.nav-links{display:flex;gap:25px;}
.nav-links a{color:var(--muted);cursor:pointer;}
.nav-links a.active,.nav-links a:hover{color:var(--text);}
.menu{display:none;font-size:24px;cursor:pointer;}

@media(max-width:768px){
  .menu{display:block;}
  .nav-links{
    position:absolute;top:60px;right:0;width:100%;
    background:#111;flex-direction:column;display:none;text-align:center;
  }
  .nav-links.show{display:flex;}
}

/* PAGES */
.page{display:none;padding:60px 20px;max-width:1100px;margin:auto;}
.page.active{display:block;}

/* HERO */
.hero{text-align:center;margin-top:40px;}
.hero h1{font-size:3rem;}
.hero p{color:var(--muted);margin:15px 0;}
.btn{
  padding:12px 22px;border:none;border-radius:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  cursor:pointer;font-weight:bold;
}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;margin-top:30px;
}
.card{
  background:var(--card);
  padding:15px;border-radius:10px;
}
.card img{width:100%;border-radius:8px;}
.price{margin:10px 0;font-weight:bold;}

/* CONTACT */
form{display:flex;flex-direction:column;gap:12px;max-width:500px;margin:auto;}
input,textarea{
  padding:12px;border:none;border-radius:6px;
}

/* FOOTER */
footer{text-align:center;padding:20px;margin-top:40px;background:#000;}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">SURGE</div>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="navLinks">
    <a onclick="showPage('home')" class="active">Home</a>
    <a onclick="showPage('products')">Products</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="hero">
    <h1>Power Your Brand</h1>
    <p>Clean. Modern. Fast.</p>
    <button class="btn" onclick="showPage('products')">Shop Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="page">
  <h2 style="text-align:center;">Products</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Surge Tee</h3>
      <div class="price">$25</div>
      <button class="btn">Buy</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Surge Hoodie</h3>
      <div class="price">$60</div>
      <button class="btn">Buy</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>Surge Hat</h3>
      <div class="price">$20</div>
      <button class="btn">Buy</button>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h2 style="text-align:center;">Contact Us</h2>

  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea rows="5" placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </form>
</div>

<footer>
  <p>© 2026 Surge. All Rights Reserved.</p>
</footer>

<script>
function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById("navLinks").classList.remove("show");
}

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
