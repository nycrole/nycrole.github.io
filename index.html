<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueline Product Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --bg2:#0a1020;
  --card:#0b1220cc;
  --text:#eef2f7;
  --muted:#9aa4af;
  --accent:#2b7bff;
  --border:rgba(255,255,255,.08);
}

html[data-theme="light"]{
  --bg:#f6f8fb;
  --bg2:#eef3f9;
  --card:rgba(255,255,255,.9);
  --text:#101828;
  --muted:#5b6472;
  --accent:#2563eb;
  --border:rgba(0,0,0,.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* HEADER */
.header{
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-family:Poppins;
  font-weight:800;
}

.logo span{color:var(--accent);}

.theme-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* PRODUCT CARD */
.product{
  max-width:420px;
  width:100%;
  padding:30px;
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--border);
  text-align:center;
}

.product h2{
  font-family:Poppins;
  font-size:28px;
}

.product p{
  margin-top:10px;
  color:var(--muted);
}

.buy-btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal.show{display:flex;}

.modal-content{
  width:min(900px,100%);
  background:var(--card);
  border-radius:24px;
  padding:20px;
}

/* EDITOR */
.editor{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:20px;
}

.canvas-wrap{
  aspect-ratio:6/8;
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
}

canvas{
  width:100%;
  height:100%;
}

.controls{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.controls input[type="file"]{
  display:none;
}

.upload{
  padding:10px;
  border-radius:999px;
  border:1px solid var(--border);
  text-align:center;
  cursor:pointer;
}

.controls input[type="range"]{
  width:100%;
}

.advance{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

@media(max-width:700px){
  .editor{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo"><span>BLUE</span>LINE</div>
  <button class="theme-btn" id="themeBtn">Light Mode</button>
</div>

<div class="product">
  <h2>6x8 Custom Card</h2>
  <p>Upload your image and customize your design.</p>
  <button class="buy-btn" id="buyBtn">Buy Now</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div id="step1">
      <div class="editor">
        <div class="canvas-wrap">
          <canvas id="canvas" width="600" height="800"></canvas>
        </div>

        <div class="controls">
          <label class="upload">
            Upload Image
            <input type="file" id="uploadInput">
          </label>

          <label>X
            <input type="range" id="x" min="-200" max="200" value="0">
          </label>

          <label>Y
            <input type="range" id="y" min="-200" max="200" value="0">
          </label>

          <label>Size
            <input type="range" id="scale" min="50" max="200" value="100">
          </label>

          <button class="advance" id="nextBtn">Advance</button>
        </div>
      </div>
    </div>

    <div id="step2" style="display:none;text-align:center;">
      <h2>Ready for Checkout</h2>
      <p style="margin-top:10px;color:var(--muted);">
        Your design is ready. Hook this into your real checkout later.
      </p>
      <button class="advance" id="backBtn">Back</button>
    </div>

  </div>
</div>

<script>
/* THEME */
const themeBtn = document.getElementById("themeBtn");
const root = document.documentElement;

themeBtn.onclick = () => {
  const t = root.getAttribute("data-theme");
  const newT = t === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", newT);
  themeBtn.textContent = newT === "dark" ? "Light Mode" : "Dark Mode";
};

/* MODAL */
const modal = document.getElementById("modal");
document.getElementById("buyBtn").onclick = () => modal.classList.add("show");
modal.onclick = e => { if(e.target === modal) modal.classList.remove("show"); };

/* CANVAS */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = null;
let posX=0,posY=0,scale=1;

function draw(){
  ctx.clearRect(0,0,600,800);

  ctx.fillStyle="#111";
  ctx.fillRect(0,0,600,800);

  if(img){
    let w=400*scale;
    let h=(img.height/img.width)*w;
    ctx.drawImage(img,100+posX,200+posY,w,h);
  } else {
    ctx.fillStyle="#555";
    ctx.fillText("Upload Image",200,400);
  }
}

draw();

/* UPLOAD */
document.getElementById("uploadInput").onchange = e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    img=new Image();
    img.onload=draw;
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
};

/* CONTROLS */
document.getElementById("x").oninput=e=>{posX=e.target.value;draw();}
document.getElementById("y").oninput=e=>{posY=e.target.value;draw();}
document.getElementById("scale").oninput=e=>{scale=e.target.value/100;draw();}

/* STEPS */
const step1=document.getElementById("step1");
const step2=document.getElementById("step2");

document.getElementById("nextBtn").onclick=()=>{
  step1.style.display="none";
  step2.style.display="block";
};

document.getElementById("backBtn").onclick=()=>{
  step2.style.display="none";
  step1.style.display="block";
};
</script>

</body>
</html>
